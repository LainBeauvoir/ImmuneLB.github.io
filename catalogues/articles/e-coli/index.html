<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #000000;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #555;
    }

    a {
      color: #000;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Page not found.</p>
    <p><a href="/">Go back home</a></p>
  </div>
</body>
</html>
